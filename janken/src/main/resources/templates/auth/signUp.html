<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント作成画面</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet"  th:href="@{/css/common.css}">
    <style></style>
</head>
<body class="p-5">
    <div class="container mt-5">
        <div class="card">
            <div class="card-header">
                アカウント作成
            </div>
            <div class="card-body">
				<span th:text="${message}" class="error-msg"></span>
                <form th:action="@{/signUp}" method="post" th:object="${signUpForm}">
                    <div class="mb-3">
                        <label for="loginId" class="form-label">メールアドレス</label>
                        <input type="text" th:field="*{email}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">パスワード</label>
                        <input type="password" th:field="*{password}" class="form-control" required>
                    </div>
					<div class="mb-3">
                        <label for="userName" class="form-label">ユーザー名</label>
                        <input type="text" th:field="*{userName}" class="form-control" required>
                    </div>
                    <div class="d-grid gap-2 col-6 mx-auto">
                    	<button type="submit" class="btn btn-primary">アカウント作成</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <a th:href="@{/login}">ログイン画面へ</a>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
