<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
	layout:decorate="~{layout/layout}">

<head>
    <title>ルーム登録・編集</title>
</head>

<section layout:fragment="content">

    <div class="container mt-4">

        <h2 class="mb-4">ルーム登録・編集</h2>

        <form th:action="@{/room/save}" th:object="${roomForm}" method="post">

            <!-- hidden: roomId -->
            <input type="hidden" th:field="*{roomId}"/>

			<!-- gameKind -->
            <div class="mb-3">
			    <label class="form-label">ゲーム種別</label>
			    <select th:field="*{gameKind}" class="form-control">
			        <option value="">-- 選択してください --</option>
			        <option th:each="kind : ${gameKinds}"
			                th:value="${kind}"
			                th:text="${kind}">
			        </option>
			    </select>
			    <div class="text-danger" th:errors="*{gameKind}"></div>
			</div>
			
            <!-- roomName -->
            <div class="mb-3">
                <label class="form-label">ルーム名</label>
                <input type="text" th:field="*{roomName}" class="form-control" placeholder="ルーム名を入力"/>
                <div class="text-danger" th:errors="*{roomName}"></div>
            </div>

            <!-- roomStatus -->
            <div class="mb-3">
                <label class="form-label">進行ステータス</label>
                <select th:field="*{roomStatus}" class="form-select">
                    <option value="">選択してください</option>
                    <option th:each="s : ${T(com.example.app.game.room.domain.RoomStatus).values()}"
                            th:value="${s}"
                            th:text="${s.statusLabel}">
                    </option>
                </select>
                <div class="text-danger" th:errors="*{roomStatus}"></div>
            </div>

            <!-- startedDate -->
            <div class="mb-3">
                <label class="form-label">開始日時</label>
                <input type="datetime-local" th:field="*{startedDate}" class="form-control"/>
                <div class="text-danger" th:errors="*{startedDate}"></div>
            </div>

            <!-- endDate -->
            <div class="mb-3">
                <label class="form-label">終了日時</label>
                <input type="datetime-local" th:field="*{endDate}" class="form-control"/>
                <div class="text-danger" th:errors="*{endDate}"></div>
            </div>

            <!-- buttons -->
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">保存</button>
                <a th:href="@{/rooms}" class="btn btn-secondary ms-2">戻る</a>
            </div>

        </form>

    </div>

</section>

</html>
