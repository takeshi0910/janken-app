<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>マイページ</title>
<link rel="stylesheet" th:href="@{/css/mypage.css}">
<link rel="stylesheet"  th:href="@{/css/common.css}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <h1>マイページ</h1>
  <div class="my-3">
    <button type="button" class="btn btn-primary" th:onclick="'location.href=\'' + @{/host} + '\''">ゲームを作成</button>
  </div>
  <div class="mb-3">
    <button type="button" class="btn btn-primary" th:onclick="'location.href=\'' + @{/guest} + '\''">ルームに参加</button>
  </div>
  <h3>あなたの参加中のゲーム</h3>
    <!-- ゲーム名のボタン一覧 -->
    <div class="mb-3" th:each="game,iterStat : ${myPages}">
      <button 
        type="button" 
        class="game-button" 
        th:text="${game.gameName}" 
        th:attr="data-gameid=${iterStat.index}"
        onclick="showGameDetail(this)">
      </button>
    </div>
  <div>
    <!-- 詳細表示エリア -->
    <div th:each="game,iterStat : ${myPages}" 
         th:id="'game-detail-' + ${iterStat.index}" 
         class="game-detail">
      <p><strong>ルームあいことば:</strong> <span th:text="${game.roomPassword}"></span></p>
	  <p><strong>状態:</strong> <span th:text="${game.gameStatus}"></span></p>
      <p><strong>出した手:</strong></p>
      <ul>
        <li th:each="name : ${game.choiceNames}" th:text="${name}"></li>
      </ul>
    </div>
  </div>
  <script>
    function showGameDetail(button) {
      const gameId = button.getAttribute('data-gameid');
      const targetDetail = document.getElementById('game-detail-' + gameId);

      // すでに表示中なら閉じる
      if (targetDetail.style.display === 'block') {
        targetDetail.style.display = 'none';
      } else {
        // 他の詳細は非表示にする
        document.querySelectorAll('.game-detail').forEach(div => {
          div.style.display = 'none';
        });
        // この詳細だけ表示する
        targetDetail.style.display = 'block';
      }
    }
  </script>
</body>
</html>
