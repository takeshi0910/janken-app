<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
	layout:decorate="~{layout/layout}">

<head>
	<title>マイページ</title>
</head>

	<section layout:fragment="content">
		
		<h1>マイページ</h1>
		
		<!-- ルームの登録・更新後のメッセージ -->
		<div th:if="${roomRegisterdMessage}" class="alert alert-success">
		    <span th:text="${roomRegisterdMessage}"></span>
		</div>
		
		<!-- じゃんけんの手の登録後のメッセージ -->
		<div th:if="${jankenHandsRegisterdMessage}" class="alert alert-success">
		    <span th:text="${jankenHandsRegisterdMessage}"></span>
		</div>

		<div class="my-3">
			<a class="btn btn-primary" th:href="@{/room/registerRoomForm}">
			    ルームを作成
			</a>
		</div>
		<h3>ルーム一覧</h3>
		
		<table class="table table-striped">
			<thead>
				<tr>
					<th>ルーム名</th>
					<th>ゲーム種別</th>
					<th>ステータス</th>
					<th>開始日時</th>
					<th>終了日時</th>
					<th>参加</th>
					<th>対戦</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="room : ${rooms}">
					<td>
					    <a th:if="${room.isRoomMaster}"
					       th:href="@{/room/registerRoomForm?roomId={id}(id=${room.roomId})}"
					       th:text="${room.roomName}">
					    </a>
					    <span th:if="${!room.isRoomMaster}"
					          th:text="${room.roomName}">
					    </span>
					</td>
					<td>
					    <span th:text="${room.gameKind}"></span>
					    <span th:if="${room.isHandRegistered != null}"
					          th:text="${room.isHandRegistered ? '（済）' : '（未）'}"
					          th:classappend="${room.isHandRegistered == false} ? 'text-danger' : ''">
					    </span>
					</td>
					<td th:text="${room.roomStatus.getStatusLabel}"></td>
					<td th:text="${#temporals.format(room.startedDate, 'yyyy/MM/dd HH:mm')}"></td>
					<td th:text="${#temporals.format(room.endDate, 'yyyy/MM/dd HH:mm')}"></td>
					<td>
					    <a th:if="${room.isPlayer}"
					       th:href="${room.roomStatus.buildUrlOrEmpty(room.gameKind, room.roomId)}"
						   class="btn btn-sm smallBtn"
						   th:classappend="${room.roomStatus.buttonClass} + (!${room.roomStatus.clickable} ? ' disabled' : '')"
						   th:text="${room.roomStatus.buttonLabel}">参加/準備中/結果
						</a>
					</td>
					<td>
					    <a class="btn btn-sm btn-danger smallBtn"
						   data-bs-toggle="modal"
						   data-bs-target="#battleModal_${room.roomId}">
						   対戦
						</a>
					</td>
				</tr>
			</tbody>
		</table>

//モーダルはここから
		<div class="modal fade" id="battleModal_${room.roomId}" tabindex="-1">
			<div class="modal-dialog">
		  		<div class="modal-content">
		
					 <div class="modal-header">
					   <h5 class="modal-title">出し手登録状況</h5>
					   <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					 </div>
		
				      <div class="modal-body">
				        <table class="table">
				          <tr th:each="player : ${room.players}">
				            <td th:text="${player.name}"></td>
				            <td th:text="${player.handLabel != null ? player.handLabel : '—'}"></td>
				            <td>
				              <span th:if="${player.handRegistered}" class="text-success">✔ 登録済み</span>
				              <span th:if="${!player.handRegistered}" class="text-danger">✖ 未登録</span>
				            </td>
				          </tr>
				        </table>
		
				        <div th:if="${!allRegistered}" class="text-danger">
				          未登録のプレイヤーがいます。
				        </div>
			     	 </div>
		
				      <div class="modal-footer">
				        <a th:href="@{/battle/execute(roomId=${room.roomId})}"
				           class="btn btn-primary"
				           th:classappend="${!allRegistered || !room.isRoomMaster} ? ' disabled' : ''">
				           対戦開始
				        </a>
				      </div>
				
				    </div>
				  </div>
				</div>
	</section>
	
</html>
