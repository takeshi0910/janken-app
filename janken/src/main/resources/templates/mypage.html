<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>マイページ</title>
<link rel="stylesheet" th:href="@{/css/mypage.css}">
<link rel="stylesheet"  th:href="@{/css/common.css}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <h1>マイページ</h1>
  <form th:action="@{/logout}" method="post">
    <button type="submit" class="btn btn-secondary">ログアウト</button>
</form>
  
  <div class="my-3">
    <button type="button" class="btn btn-primary" th:onclick="'location.href=\'' + @{/host} + '\''">ゲームを作成</button>
  </div>
  <h3>あなたの参加中のゲーム</h3>
    <table class="table table-striped">
  <thead>
    <tr>
      <th>ルーム名</th>
      <th>ゲーム種別</th>
      <th>ステータス</th>
      <th>開始日時</th>
      <th>終了日時</th>
      <th>参加</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="room : ${rooms}">
      <td th:text="${room.roomName}"></td>
      <td th:text="${room.gameKind}"></td>
      <td th:text="${room.roomStatus.displayName}"></td>
      <td th:text="${#temporals.format(room.startedDate, 'yyyy/MM/dd HH:mm')}"></td>
      <td th:text="${#temporals.format(room.endDate, 'yyyy/MM/dd HH:mm')}"></td>
      <td>
        <a th:href="@{/rooms/{id}(id=${room.roomId})}"  class="btn btn-primary btn-sm">
          参加
        </a>
      </td>
    </tr>
  </tbody>
</table>

</body>
</html>
