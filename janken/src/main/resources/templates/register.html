<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント作成画面</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 500px;
            margin-top: 100px;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            background-color: #007bff;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            border-radius: 10px 10px 0 0;
        }
        .form-label {
            font-weight: bold;
        }
        .form-control {
            border-radius: 5px;
        }
        .btn-primary {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
        }
        .text-center {
            margin-top: 10px;
        }
		.message {
		    color: red;
		    font-weight: bold;
		    margin-bottom: 15px;
		    display: block;
		    text-align: center;
		}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                アカウント作成
            </div>
            <div class="card-body">
				<span th:text="${message}" class="message"></span>
                <form th:action="@{/register}" method="post" th:object="${userRegisterForm}">
                    <div class="mb-3">
                        <label for="loginId" class="form-label">メールアドレス</label>
                        <input type="text" th:field="*{email}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">パスワード</label>
                        <input type="password" th:field="*{password}" class="form-control" required>
                    </div>
					<div class="mb-3">
                        <label for="userName" class="form-label">ユーザー名</label>
                        <input type="text" th:field="*{userName}" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">アカウント作成</button>
                </form>
                <div class="text-center">
                    <a th:href="@{/login}">ログイン画面へ</a>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
