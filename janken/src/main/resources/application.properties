spring.application.name=janken

# --- DB接続設定（Railway Shared Variables を使用） ---
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HikariCP ---
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000

# --- JPA設定 ---
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- MyBatis ---
mybatis.mapper-locations=classpath*:mybatis/**/*.xml
mybatis.type-handlers-package=com.example.app

# --- ログ ---
logging.level.com.mysql.cj=DEBUG

# --- ポート設定（Railway が自動で PORT を渡す） ---
server.port=${PORT:8080}